baseURL = 'https://mohamedtahaguelzim.github.io/blog/'
languageCode = 'en-us'
title = 'guelzim'
theme = 'paper'

[params]
  # Show color mode toggle
  colorMode = 'auto'
  # Twitter/social cards
  description = 'Security research, software engineering, and other things.'
  author = 'Mohamed Taha Guelzim'

# Mount drafts folder so `hugo server` sees them locally
[module]
  [[module.mounts]]
    source = 'content'
    target = 'content'
  [[module.mounts]]
    source = 'content/drafts'
    target = 'content/posts'

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = true
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    name = 'Posts'
    url = '/posts/'
    weight = 1
  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 2
